services:
  api:
    build: ./backend/VaultAuth.Api
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Host=db;Database=vaultauth;Username=Jeliane101;Password=Jeliane@123#!

  db:
    image: postgres:15
    container_name: vaultauth_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vaultauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
